# @package _global_

# Derived from `configs/experiment/tiger_train_flat.yaml` but plugs into
# `python -m src.unlearn`. Differences vs the train config:
#
# * `model._target_` points at `TigerUnlearningModule` (drop-in subclass of
#   `SemanticIDEncoderDecoder`) so the ckpt schema stays identical and the
#   unlearned ckpt loads back into `src.inference experiment=tiger_inference_flat`.
# * Adds the `unlearning.*` group (algorithm = `scif`, neighborhood-aware
#   knobs, CG hyper-parameters, target-params policy, ...).
# * Adds `forget_subdir`/`retain_subdir` pointing at the output of
#   `src.data.unlearning.split_forget_retain`.
# * Trainer is single-device (no DDP) -- SCIF needs a single-process autograd
#   graph for HVPs.
# * Disables the `model_checkpoint` callback (we save the unlearned ckpt
#   manually) and the `early_stopping` callback (no fit loop).

data_dir: ???
semantic_id_path: ???
ckpt_path: ???
num_hierarchies: ???
sequence_length: 120
seed: 2

# Forget/retain layout produced by `src.data.unlearning.split_forget_retain`
forget_subdir: training_forget
retain_subdir: training_retain

# Algorithm group ----------------------------------------------------------
unlearning:
  algorithm: scif
  deletion_spec: session
  forget_size: null
  retain_samples_used_for_update: 16
  retain_sample_size: null
  repair_sample_bound: null
  retain_max_rows: null
  neighborhood_aware: false
  neighborhood_method: prefix
  neighborhood_aware_sample_rate: 1.0
  neighbor_aware_factor: 8.0
  sid_prefix_length: 2
  progressive_sid_prefix: true
  embedding_path: null
  embedding_epsilon: null
  embedding_max_neighbors: 100
  damping: 0.01
  cg_max_iter: 200
  cg_tol: 1.0e-5
  cg_solution_max_norm: null
  max_norm: null
  update_max_norm: 1.0
  batch_size_per_device: 256
  target_params: tiger
  eval_mode: true
  rows_per_shard: 4096
  finetune_steps: 500
  finetune_lr: 0.001
  neg_train_steps: 200
  neg_train_lr: 0.001
  neg_retain_every: 5
  filter_mode: global
  forget_loss_level: token
  lambda_forget: 1.0
  lambda_sep: 0.1
  sep_temperature: 0.07
  unified_steps: 500
  # Alternative to unified_steps: total optim steps = n_batch_passes * min(n_forget_batches, n_retain_batches).
  # If set (non-null), takes priority over unified_steps.
  n_batch_passes: null
  unified_lr: 1.0e-4
  local_repair:
    enabled: false
    logit_suppression: false
    adapter_repair: false
    prefix_repair: false
    mass_regularization: false
    gamma: 1.0

task_name: unlearn
id: ${now:%Y-%m-%d}/${now:%H-%M-%S}
tags:
  - amazon-p5-gr-unlearn-scif

# Data loading -------------------------------------------------------------
# Mirror tiger_train_flat.yaml verbatim so the train dataloader config can
# serve as a template for the forget/retain finite loaders we build inside
# `TigerUnlearningModule.run_scif_unlearning`.
data_loading:
  features_config:
    features:
    - name: sequence_data
      num_placeholder_tokens: 0
      semantic_ids: ???
      is_item_ids: true
      type:
        _target_: torch.__dict__.get
        _args_:
        - int32
    - name: embedding
      type:
        _target_: torch.__dict__.get
        _args_:
        - float32
    - name: text
      type:
        _target_: torch.__dict__.get
        _args_:
        - bytes
    - name: user_id
      is_item_ids: true
      type:
        _target_: torch.__dict__.get
        _args_:
        - int32
  dataset_config:
    dataset:
      _target_: src.data.loading.components.interfaces.SemanticIDDatasetConfig
      user_id_field: user_id
      min_sequence_length: 1
      iterate_per_row: true
      keep_user_id: true
      features_to_consider: ${extract_fields_from_list_of_dicts:${data_loading.features_config.features},
        "name", False, "is_item_ids", "True"}
      num_placeholder_tokens_map: ${create_map_from_list_of_dicts:${data_loading.features_config.features},
        "name", "num_placeholder_tokens"}
      semantic_id_map: ${create_map_from_list_of_dicts:${data_loading.features_config.features},
        "name", "semantic_ids"}
      data_iterator:
        _target_: src.data.loading.components.iterators.TFRecordIterator
      preprocessing_functions:
      - _target_: src.data.loading.components.pre_processing.filter_features_to_consider
        _partial_: true
      - _target_: src.data.loading.components.pre_processing.convert_to_dense_numpy_array
        _partial_: true
      - _target_: src.data.loading.components.pre_processing.convert_fields_to_tensors
        _partial_: true
      - _target_: src.data.loading.components.pre_processing.map_sparse_id_to_semantic_id
        _partial_: true
        features_to_apply:
        - sequence_data
        num_hierarchies: ${model.num_hierarchies}
  train_dataloader_config:
    dataloader:
      _target_: src.data.loading.components.interfaces.SequenceDataloaderConfig
      dataset_class:
        _target_: src.data.loading.components.dataloading.UnboundedSequenceIterable
        _partial_: true
      data_folder: ${paths.data_dir}/training
      should_shuffle_rows: false
      labels:
        sequence_data:
          transform:
            _target_: src.data.loading.components.label_function.NextKTokenMasking
            next_k: ${model.num_hierarchies}
      batch_size_per_device: 32
      num_workers: 0
      timeout: 0
      assign_files_by_size: false
      oov_token: null
      masking_token: -1
      sequence_length: ${sequence_length}
      padding_token: -1
      drop_last: false
      persistent_workers: false
      collate_fn:
        _target_: src.data.loading.components.collate_functions.collate_with_sid_causal_duplicate
        _partial_: true
        sequence_length: ${data_loading.train_dataloader_config.dataloader.sequence_length}
        padding_token: ${data_loading.train_dataloader_config.dataloader.padding_token}
        sequence_field_name: sequence_data
        sid_hierarchy: ${model.num_hierarchies}
        max_batch_size: 512
      dataset_config:
        _target_: src.data.loading.components.interfaces.SemanticIDDatasetConfig
        user_id_field: user_id
        min_sequence_length: 1
        iterate_per_row: true
        keep_user_id: true
        features_to_consider: ${extract_fields_from_list_of_dicts:${data_loading.features_config.features},
          "name", False, "is_item_ids", "True"}
        num_placeholder_tokens_map: ${create_map_from_list_of_dicts:${data_loading.features_config.features},
          "name", "num_placeholder_tokens"}
        semantic_id_map:
          sequence_data:
            _target_: torch.load
            _args_:
            - _target_: src.utils.file_utils.open_local_or_remote
              file_path: ${semantic_id_path}
              mode: rb
        data_iterator:
          _target_: src.data.loading.components.iterators.TFRecordIterator
        preprocessing_functions:
        - _target_: src.data.loading.components.pre_processing.filter_features_to_consider
          _partial_: true
        - _target_: src.data.loading.components.pre_processing.convert_to_dense_numpy_array
          _partial_: true
        - _target_: src.data.loading.components.pre_processing.convert_fields_to_tensors
          _partial_: true
        - _target_: src.data.loading.components.pre_processing.map_sparse_id_to_semantic_id
          _partial_: true
          features_to_apply:
          - sequence_data
          num_hierarchies: ${model.num_hierarchies}
      assign_all_files_per_worker: true
  datamodule:
    _target_: src.data.loading.datamodules.sequence_datamodule.SequenceDataModule
    train_dataloader_config: ${..train_dataloader_config.dataloader}

# Model --------------------------------------------------------------------
# `TigerUnlearningModule` is a subclass of `SemanticIDEncoderDecoder` so
# every constructor kwarg is identical to `tiger_train_flat.yaml`.
model:
  huggingface_model:
    _target_: transformers.T5EncoderModel
    config:
      _target_: transformers.T5Config
      vocab_size: 256
      d_model: 128
      num_heads: 6
      dropout_rate: 0.15
      d_ff: 1024
      d_kv: 64
      num_layers: 4
  _target_: src.models.modules.semantic_id.tiger_unlearning_module.TigerUnlearningModule
  feature_to_model_input_map:
    sequence_data: input_ids
    user_id: user_id
  postprocessor: null
  aggregator: null
  loss_function: ${loss.loss_function}
  optimizer: ${optim.optimizer}
  scheduler: ${optim.scheduler}
  evaluator: ${eval.evaluator}
  weight_tying: true
  compile: false
  decoder:
    _target_: transformers.models.t5.modeling_t5.T5Stack
    config:
      _target_: transformers.models.t5.configuration_t5.T5Config
      vocab_size: ${model.huggingface_model.config.vocab_size}
      d_model: ${model.huggingface_model.config.d_model}
      num_heads: ${model.huggingface_model.config.num_heads}
      dropout_rate: 0.15
      d_ff: ${model.huggingface_model.config.d_ff}
      d_kv: ${model.huggingface_model.config.d_kv}
      num_layers: 4
      is_decoder: true
      is_encoder_decoder: false
    embed_tokens:
      _target_: torch.nn.Embedding
      num_embeddings: ${model.huggingface_model.config.vocab_size}
      embedding_dim: ${model.huggingface_model.config.d_model}
  num_hierarchies: ${num_hierarchies}
  num_user_bins: null
  codebooks: ${data_loading.train_dataloader_config.dataloader.dataset_config.semantic_id_map.sequence_data}
  mlp_layers: 2

# Callbacks: keep a model-summary, drop everything fit-related --------------
# `defaults: callbacks: default` inherits a model_checkpoint/early_stopping
# pair that monitor `val/loss` -- there is no validation loop in the unlearn
# entry point, so disable them via null (instantiate_callbacks skips nulls).
callbacks:
  model_checkpoint: null
  early_stopping: null
  model_summary:
    _target_: lightning.pytorch.callbacks.RichModelSummary
    max_depth: -1

# Logger ------------------------------------------------------------------
logger:
  csv:
    _target_: lightning.pytorch.loggers.csv_logs.CSVLogger
    save_dir: ${paths.output_dir}
    name: csv/
    prefix: ''

# Trainer is instantiated by pipeline_launcher but never `fit()`-ed; we use
# devices=1 + strategy=auto so SCIF runs in a single autograd process.
trainer:
  _target_: lightning.pytorch.trainer.Trainer
  default_root_dir: ${paths.output_dir}
  max_steps: 1
  max_epochs: 1
  accelerator: gpu
  devices: 1
  num_nodes: 1
  precision: 32-true
  enable_progress_bar: false
  log_every_n_steps: 100
  # Best-effort reproducibility for SCIF (CUDA ops may still vary by driver).
  deterministic: true
  strategy: auto
  num_sanity_val_steps: 0

paths:
  root_dir: .
  data_dir: ${data_dir}
  log_dir: ${paths.root_dir}/logs
  output_dir: ${hydra:runtime.output_dir}
  work_dir: ${hydra:runtime.cwd}
  profile_dir: ${hydra:run.dir}/profile_output
  metadata_dir: ${paths.output_dir}/metadata

extras:
  ignore_warnings: false
  enforce_tags: true
  print_config_warnings: true
  print_config: true

loss:
  loss_function:
    _target_: torch.nn.CrossEntropyLoss

optim:
  optimizer:
    _target_: torch.optim.Adam
    _partial_: true
    lr: 0.001
    weight_decay: 0.0001
  scheduler: null

eval:
  evaluator:
    _target_: src.components.eval_metrics.SIDRetrievalEvaluator
    top_k_list:
    - 5
    - 10
    metrics:
      ndcg:
        _target_: src.components.eval_metrics.NDCG
        _partial_: true
      recall:
        _target_: src.components.eval_metrics.Recall
        _partial_: true
